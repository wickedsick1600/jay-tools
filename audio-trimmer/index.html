<style>
  .trim-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
    margin-top: 4px;
  }
  .trim-fields label { margin-top: 8px; }
  .trim-fields input,
  #export-format {
    font-size: 16px;
  }
  .audio-timeline-wrap { margin: 8px 0 4px; }
  .audio-timeline-wrap > label { margin-top: 8px; }
  .audio-timeline {
    position: relative;
    height: 44px;
    margin: 6px 0 14px;
    touch-action: none;
    user-select: none;
  }
  .audio-timeline__track {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 8px;
    border-radius: 4px;
    background: var(--border-strong);
  }
  .audio-timeline__region {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 8px;
    border-radius: 4px;
    background: var(--accent);
    pointer-events: none;
  }
  .audio-timeline__playhead {
    position: absolute;
    top: 50%;
    width: 3px;
    height: 22px;
    margin-left: -1.5px;
    transform: translateY(-50%);
    border-radius: 2px;
    background: var(--success);
    pointer-events: none;
    opacity: 0;
    transition: opacity 120ms ease;
    z-index: 2;
  }
  .audio-timeline__playhead.is-visible { opacity: 1; }
  .audio-timeline__handle {
    position: absolute;
    top: 50%;
    width: 16px;
    height: 28px;
    margin-left: -8px;
    transform: translateY(-50%);
    border-radius: 4px;
    border: 2px solid var(--white);
    background: var(--accent);
    box-shadow: var(--shadow-sm);
    cursor: grab;
    padding: 0;
    z-index: 3;
    touch-action: none;
  }
  .audio-timeline__handle:active { cursor: grabbing; }
  .audio-timeline__handle--end { background: var(--accent-hover); }
  .audio-timeline.is-disabled { opacity: 0.45; pointer-events: none; }
  .trim-actions.row { margin-top: 12px; }
  .time-format-hint { margin-top: 8px; margin-bottom: 0; }
  @media (max-width: 560px) {
    .trim-fields {
      grid-template-columns: 1fr;
    }
    .trim-actions.row {
      flex-direction: column;
    }
    .trim-actions.row button {
      width: 100%;
    }
    .audio-timeline {
      height: 52px;
    }
    .audio-timeline__track {
      height: 10px;
    }
    .audio-timeline__region {
      height: 10px;
    }
    .audio-timeline__handle {
      width: 22px;
      height: 40px;
      min-width: 44px;
      min-height: 44px;
      margin-left: -22px;
    }
  }
</style>

  <section class="hero"><span class="tag">Free · Runs in your browser</span><h1>Audio Trimmer</h1><p>Cut an audio clip by start/end time and download as WAV or MP3.</p></section>

  <div class="row trim-actions">

    <button id="trim-btn" type="button" class="success">Trim and download</button>
