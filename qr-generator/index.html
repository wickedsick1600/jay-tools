<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Code Generator — Download PNG | DevJay Tools</title>
<meta name="description" content="Generate a QR code from text or URL and download it as PNG.">
<meta name="theme-color" content="#0a0f1a">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site-header"><div class="wrap"><a class="brand" href="/"><span class="dot"></span>DevJay Tools</a><nav><a href="/">All tools</a><a href="/#feedback">Feedback</a><a class="cta" href="/#donate">Donate</a></nav></div></header>
<main>
  <section class="hero"><span class="tag">Free · Runs in your browser</span><h1>QR Code Generator</h1><p>Turn any link or text into a QR code you can download.</p></section>
  <label for="text">URL or text</label>
  <textarea id="text" spellcheck="false" placeholder="https://example.com"></textarea>
  <label for="size">Size (px)</label>
  <input id="size" type="number" min="128" max="1024" value="320">
  <div class="row"><button id="gen-btn" class="success">Generate QR</button><button id="download-btn" class="secondary">Download PNG</button></div>
  <div id="qr" class="card"></div>
  <div id="msg" class="muted" role="status" aria-live="polite"></div>
</main>
<footer class="site-footer"><div class="wrap"><div><a href="/privacy.html">Privacy</a><a href="/terms.html">Terms</a><a href="/">All tools</a></div><div><a href="https://ko-fi.com/devjaybusiness" target="_blank" rel="noopener">Ko-fi</a><a href="https://paypal.me/devjaybusiness" target="_blank" rel="noopener">PayPal</a></div></div></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const textEl = document.getElementById('text');
const sizeEl = document.getElementById('size');
const qrEl = document.getElementById('qr');
const msg = document.getElementById('msg');
let qr = null;
function flash(text, isError) { msg.textContent = text; msg.className = isError ? 'error' : 'muted'; }
function generate() {
  const text = textEl.value.trim();
  if (!text) { flash('Enter text first.', true); return; }
  const size = Math.max(128, Math.min(1024, parseInt(sizeEl.value, 10) || 320));
  qrEl.innerHTML = '';
  qr = new QRCode(qrEl, { text, width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
  flash('QR generated.');
}
document.getElementById('gen-btn').addEventListener('click', generate);
document.getElementById('download-btn').addEventListener('click', () => {
  const img = qrEl.querySelector('img');
  const canvas = qrEl.querySelector('canvas');
  const src = img ? img.src : (canvas ? canvas.toDataURL('image/png') : '');
  if (!src) { flash('Generate a QR first.', true); return; }
  const a = document.createElement('a');
  a.href = src;
  a.download = 'qr-code.png';
  document.body.appendChild(a);
  a.click();
  a.remove();
  flash('Downloaded.');
});
textEl.value = 'https://jaytools.netlify.app/';
generate();
</script>
</body>
</html>
