<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVG Optimizer — Clean and Minify SVG | DevJay Tools</title>
<meta name="description" content="Strip common SVG bloat and minify markup in your browser.">
<meta name="theme-color" content="#0a0f1a">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site-header"><div class="wrap"><a class="brand" href="/"><span class="dot"></span>DevJay Tools</a><nav><a href="/">All tools</a><a href="/#feedback">Feedback</a><a class="cta" href="/#donate">Donate</a></nav></div></header>
<main>
  <section class="hero"><span class="tag">Free · Runs in your browser</span><h1>SVG Optimizer</h1><p>Clean up and minify SVG markup quickly.</p></section>
  <label for="input">SVG input</label>
  <textarea id="input" spellcheck="false"></textarea>
  <div class="row"><button id="opt-btn" class="success">Optimize</button><button id="copy-btn" class="secondary">Copy output</button></div>
  <label for="output">Optimized SVG</label>
  <textarea id="output" spellcheck="false" readonly></textarea>
  <div id="msg" class="muted" role="status" aria-live="polite"></div>
</main>
<footer class="site-footer"><div class="wrap"><div><a href="/privacy.html">Privacy</a><a href="/terms.html">Terms</a><a href="/">All tools</a></div><div><a href="https://ko-fi.com/devjaybusiness" target="_blank" rel="noopener">Ko-fi</a><a href="https://paypal.me/devjaybusiness" target="_blank" rel="noopener">PayPal</a></div></div></footer>
<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const msg = document.getElementById('msg');
function flash(text, isError) { msg.textContent = text; msg.className = isError ? 'error' : 'muted'; }
function optimize(svg) {
  return svg
    .replace(/<!--[\s\S]*?-->/g, '')
    .replace(/\s{2,}/g, ' ')
    .replace(/>\s+</g, '><')
    .replace(/\s?(id|class|data-name|xmlns:xlink)="[^"]*"/g, (m, attr) => (attr === 'xmlns:xlink' ? m : ''))
    .trim();
}
document.getElementById('opt-btn').addEventListener('click', () => {
  const raw = input.value.trim();
  if (!raw.includes('<svg')) { flash('Paste valid SVG first.', true); return; }
  output.value = optimize(raw);
  flash(`Optimized. ${raw.length} -> ${output.value.length} chars.`);
});
document.getElementById('copy-btn').addEventListener('click', async () => {
  if (!output.value) return;
  await navigator.clipboard.writeText(output.value);
  flash('Copied.');
});
</script>
</body>
</html>
