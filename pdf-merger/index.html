<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Merger — Combine PDF Files | DevJay Tools</title>
<meta name="description" content="Merge multiple PDF files into one directly in your browser.">
<meta name="theme-color" content="#0a0f1a">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site-header"><div class="wrap"><a class="brand" href="/"><span class="dot"></span>DevJay Tools</a><nav><a href="/">All tools</a><a href="/#feedback">Feedback</a><a class="cta" href="/#donate">Donate</a></nav></div></header>
<main>
  <section class="hero"><span class="tag">Free · Runs in your browser</span><h1>PDF Merger</h1><p>Combine multiple PDFs into one file without uploading anything.</p></section>
  <label for="files">Select PDF files</label>
  <input id="files" type="file" accept="application/pdf" multiple>
  <div class="row"><button id="merge-btn" class="success">Merge and download</button></div>
  <div id="msg" class="muted" role="status" aria-live="polite"></div>
</main>
<footer class="site-footer"><div class="wrap"><div><a href="/privacy.html">Privacy</a><a href="/terms.html">Terms</a><a href="/">All tools</a></div><div><a href="https://ko-fi.com/devjaybusiness" target="_blank" rel="noopener">Ko-fi</a><a href="https://paypal.me/devjaybusiness" target="_blank" rel="noopener">PayPal</a></div></div></footer>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
<script>
const filesEl = document.getElementById('files');
const msg = document.getElementById('msg');
function flash(text, isError) { msg.textContent = text; msg.className = isError ? 'error' : 'muted'; }
document.getElementById('merge-btn').addEventListener('click', async () => {
  const files = Array.from(filesEl.files || []);
  if (files.length < 2) { flash('Select at least 2 PDF files.', true); return; }
  try {
    const outPdf = await PDFLib.PDFDocument.create();
    for (const file of files) {
      const bytes = await file.arrayBuffer();
      const srcPdf = await PDFLib.PDFDocument.load(bytes);
      const copiedPages = await outPdf.copyPages(srcPdf, srcPdf.getPageIndices());
      copiedPages.forEach((p) => outPdf.addPage(p));
    }
    const outBytes = await outPdf.save();
    const blob = new Blob([outBytes], { type: 'application/pdf' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'merged.pdf';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    flash('Merged and downloaded.');
  } catch (err) {
    flash('Failed to merge PDFs: ' + err.message, true);
  }
});
</script>
</body>
</html>
